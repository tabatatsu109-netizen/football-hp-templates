<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チーム</title>
  <style>
    :root { --main: #1a3a5c; --sub: #e8b400; --accent: #e84040; --text: #333; --bg: #fff; --bg-light: #f5f7fa; --border: #e0e0e0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; color: var(--text); background: var(--bg); }
    a { color: inherit; text-decoration: none; }

    header { background: var(--main); color: #fff; padding: 0 20px; }
    .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 70px; }
    .header-logo { display: flex; align-items: center; gap: 12px; }
    .header-logo img { height: 44px; width: 44px; object-fit: contain; display: none; }
    .header-logo h1 { font-size: 1.2rem; letter-spacing: 0.05em; }
    nav ul { list-style: none; display: flex; gap: 24px; }
    nav a { font-size: 0.9rem; padding: 4px 0; border-bottom: 2px solid transparent; transition: border-color 0.2s; }
    nav a:hover, nav a.active { border-color: var(--sub); }

    .page-hero { background: var(--main); color: #fff; padding: 48px 20px; text-align: center; }
    .page-hero h2 { font-size: 1.6rem; letter-spacing: 0.1em; }
    .page-hero h2::after { content: ''; display: block; width: 40px; height: 3px; background: var(--sub); margin: 12px auto 0; }

    section { padding: 64px 20px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .section-title { font-size: 1.4rem; font-weight: bold; color: var(--main); margin-bottom: 32px; border-left: 4px solid var(--sub); padding-left: 12px; }
    .section-text { line-height: 1.9; font-size: 0.95rem; max-width: 720px; }

    .team-intro { background: var(--bg); }

    /* スタッフ */
    .staff-section { background: var(--bg-light); }
    .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .staff-card { background: #fff; border-radius: 8px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .staff-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; margin-bottom: 10px; background: #ddd; }
    .staff-name { font-weight: bold; margin-bottom: 4px; }
    .staff-role { font-size: 0.82rem; color: var(--main); font-weight: bold; margin-bottom: 4px; }
    .staff-license { font-size: 0.78rem; color: #888; margin-bottom: 8px; }
    .staff-comment { font-size: 0.82rem; color: #666; line-height: 1.5; }

    /* 選手 */
    .players-section { background: var(--bg); }
    .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
    .player-card { background: var(--bg-light); border-radius: 8px; padding: 16px 12px; text-align: center; }
    .player-number { font-size: 1.4rem; font-weight: bold; color: var(--main); }
    .player-name { font-size: 0.88rem; margin: 4px 0; }
    .player-position { font-size: 0.78rem; color: var(--sub); font-weight: bold; background: var(--main); padding: 2px 8px; border-radius: 3px; display: inline-block; color: #fff; }

    footer { background: var(--main); color: #fff; padding: 40px 20px; text-align: center; font-size: 0.85rem; }
    .footer-inner { max-width: 1100px; margin: 0 auto; }
    .footer-name { font-size: 1rem; font-weight: bold; margin-bottom: 10px; }
    .footer-info { color: rgba(255,255,255,0.7); line-height: 1.8; margin-bottom: 16px; }
    .footer-social { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .footer-social a { color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.3); padding: 5px 16px; border-radius: 4px; font-size: 0.82rem; }
    .footer-copy { margin-top: 24px; color: rgba(255,255,255,0.4); font-size: 0.75rem; }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-logo">
        <img id="club-logo" src="" alt="ロゴ">
        <h1 id="club-name">クラブ名</h1>
      </div>
      <nav>
        <ul>
          <li><a href="index.html">ホーム</a></li>
          <li><a href="team.html" class="active">チーム</a></li>
          <li><a href="news.html">ニュース</a></li>
          <li><a href="results.html">試合結果</a></li>
          <li><a href="contact.html">お問い合わせ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="page-hero">
    <h2>チーム</h2>
  </div>

  <main>

    <section class="team-intro">
      <div class="container">
        <h2 class="section-title">チーム紹介</h2>
        <p class="section-text" id="team-description"></p>
      </div>
    </section>

    <section class="staff-section" id="section-staff">
      <div class="container">
        <h2 class="section-title">スタッフ</h2>
        <div class="staff-grid" id="staff-list"></div>
      </div>
    </section>

    <section class="players-section">
      <div class="container">
        <h2 class="section-title">選手一覧</h2>
        <div class="players-grid" id="players-list"></div>
      </div>
    </section>

  </main>

  <footer>
    <div class="footer-inner">
      <p class="footer-name" id="footer-club-name">クラブ名</p>
      <div class="footer-info">
        <p id="footer-address"></p>
        <p id="footer-phone"></p>
        <p id="footer-email"></p>
      </div>
      <div class="footer-social">
        <a id="sns-instagram" href="#" style="display:none">Instagram</a>
        <a id="sns-facebook" href="#" style="display:none">Facebook</a>
        <a id="sns-youtube" href="#" style="display:none">YouTube</a>
        <a id="sns-line" href="#" style="display:none">LINE</a>
      </div>
      <p class="footer-copy">&copy; <span id="footer-club-name-copy">クラブ名</span>. All rights reserved.</p>
    </div>
  </footer>

  <script>
    fetch('config/club-config.json')
      .then(r => r.json())
      .then(c => {
        document.title = c.club.name + ' | チーム';
        document.documentElement.style.setProperty('--main', c.design.mainColor);
        document.documentElement.style.setProperty('--sub', c.design.subColor);
        document.documentElement.style.setProperty('--accent', c.design.accentColor);

        if (c.design.favicon) {
          const fav = document.createElement('link');
          fav.rel = 'icon'; fav.href = c.design.favicon;
          document.head.appendChild(fav);
        }

        const logo = document.getElementById('club-logo');
        if (c.design.logo) { logo.src = c.design.logo; logo.style.display = 'block'; }

        document.getElementById('club-name').textContent = c.club.name;
        document.getElementById('team-description').textContent = c.club.description;

        document.getElementById('footer-club-name').textContent = c.club.name;
        document.getElementById('footer-club-name-copy').textContent = c.club.name;
        document.getElementById('footer-address').textContent = c.contact.address;
        document.getElementById('footer-phone').textContent = c.contact.phone;
        document.getElementById('footer-email').textContent = c.contact.email;

        const snsMap = {
          'sns-instagram': c.sns.instagram,
          'sns-facebook':  c.sns.facebook,
          'sns-youtube':   c.sns.youtube,
          'sns-line':      c.sns.lineUrl
        };
        Object.entries(snsMap).forEach(([id, url]) => {
          if (url) { const el = document.getElementById(id); el.href = url; el.style.display = ''; }
        });

        // スタッフ
        const staffSection = document.getElementById('section-staff');
        if (c.features.showStaff === false) {
          staffSection.style.display = 'none';
        } else {
          const staffList = document.getElementById('staff-list');
          staffList.innerHTML = (c.staff || []).map(s => `
            <div class="staff-card">
              ${s.photo ? `<img src="${s.photo}" alt="${s.name}">` : ''}
              <p class="staff-role">${s.role || ''}</p>
              <p class="staff-name">${s.name || ''}</p>
              <p class="staff-license">${s.license || ''}</p>
              <p class="staff-comment">${s.comment || ''}</p>
            </div>
          `).join('') || '<p style="color:#aaa">スタッフ情報はありません</p>';
        }

        // 選手
        const playersList = document.getElementById('players-list');
        playersList.innerHTML = (c.players || []).map(p => `
          <div class="player-card">
            <p class="player-number">${p.number !== undefined ? '#' + p.number : ''}</p>
            <p class="player-name">${p.name || ''}</p>
            <span class="player-position">${p.position || ''}</span>
          </div>
        `).join('') || '<p style="color:#aaa">選手情報はありません</p>';
      })
      .catch(err => console.error('club-config.json 読み込みエラー:', err));
  </script>

</body>
</html>
