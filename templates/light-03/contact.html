<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ</title>
  <style>
    :root { --main: #1a3a5c; --sub: #e8b400; --accent: #e84040; --text: #333; --bg: #fff; --bg-light: #f5f7fa; --border: #e0e0e0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; color: var(--text); background: var(--bg); }
    a { color: inherit; text-decoration: none; }

    header { background: var(--main); color: #fff; padding: 0 20px; }
    .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 70px; }
    .header-logo { display: flex; align-items: center; gap: 12px; }
    .header-logo img { height: 44px; width: 44px; object-fit: contain; display: none; }
    .header-logo h1 { font-size: 1.2rem; letter-spacing: 0.05em; }
    nav ul { list-style: none; display: flex; gap: 24px; }
    nav a { font-size: 0.9rem; padding: 4px 0; border-bottom: 2px solid transparent; transition: border-color 0.2s; }
    nav a:hover, nav a.active { border-color: var(--sub); }

    .page-hero { background: var(--main); color: #fff; padding: 48px 20px; text-align: center; }
    .page-hero h2 { font-size: 1.6rem; letter-spacing: 0.1em; }
    .page-hero h2::after { content: ''; display: block; width: 40px; height: 3px; background: var(--sub); margin: 12px auto 0; }

    main { padding: 64px 20px; }
    .container { max-width: 640px; margin: 0 auto; }

    .contact-info { background: var(--bg-light); border-radius: 8px; padding: 24px; margin-bottom: 40px; font-size: 0.9rem; line-height: 1.8; }
    .contact-info h3 { font-size: 1rem; color: var(--main); margin-bottom: 12px; border-left: 4px solid var(--sub); padding-left: 10px; }
    .contact-info p { margin: 2px 0; }

    .contact-form { display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.88rem; font-weight: bold; color: var(--main); }
    .required { color: #c00; font-size: 0.75rem; margin-left: 4px; }
    .form-group input, .form-group select, .form-group textarea {
      border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px;
      font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--main);
    }
    .form-group textarea { min-height: 160px; resize: vertical; }
    .submit-btn {
      background: var(--main); color: #fff; border: none; padding: 14px 40px;
      font-size: 1rem; border-radius: 4px; cursor: pointer; align-self: center;
      transition: opacity 0.2s; font-family: inherit;
    }
    .submit-btn:hover { opacity: 0.85; }

    .social-section { margin-top: 48px; text-align: center; }
    .social-section h3 { font-size: 1rem; color: var(--main); margin-bottom: 16px; }
    .social-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .social-link { display: inline-block; padding: 10px 24px; border: 2px solid var(--main); border-radius: 4px; font-size: 0.88rem; transition: background 0.2s, color 0.2s; }
    .social-link:hover { background: var(--main); color: #fff; }

    footer { background: var(--main); color: #fff; padding: 40px 20px; text-align: center; font-size: 0.85rem; }
    .footer-inner { max-width: 1100px; margin: 0 auto; }
    .footer-name { font-size: 1rem; font-weight: bold; margin-bottom: 10px; }
    .footer-info { color: rgba(255,255,255,0.7); line-height: 1.8; margin-bottom: 16px; }
    .footer-social { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .footer-social a { color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.3); padding: 5px 16px; border-radius: 4px; font-size: 0.82rem; }
    .footer-copy { margin-top: 24px; color: rgba(255,255,255,0.4); font-size: 0.75rem; }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-logo">
        <img id="club-logo" src="" alt="ロゴ">
        <h1 id="club-name">クラブ名</h1>
      </div>
      <nav>
        <ul>
          <li><a href="index.html">ホーム</a></li>
          <li><a href="team.html">チーム</a></li>
          <li><a href="news.html">ニュース</a></li>
          <li><a href="results.html">試合結果</a></li>
          <li><a href="contact.html" class="active">お問い合わせ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="page-hero">
    <h2>お問い合わせ</h2>
  </div>

  <main>
    <div class="container">

      <div class="contact-info">
        <h3>お問い合わせ先</h3>
        <p id="contact-address"></p>
        <p id="contact-phone"></p>
        <p>Email: <a id="contact-email" href="#"></a></p>
      </div>

      <form class="contact-form" id="contact-form">
        <div class="form-group">
          <label>お名前<span class="required">必須</span></label>
          <input type="text" name="name" placeholder="山田 太郎" required>
        </div>
        <div class="form-group">
          <label>メールアドレス<span class="required">必須</span></label>
          <input type="email" name="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label>お問い合わせ種別</label>
          <select name="category">
            <option value="">選択してください</option>
            <option value="join">入団について</option>
            <option value="trial">体験について</option>
            <option value="sponsor">スポンサーについて</option>
            <option value="other">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label>メッセージ<span class="required">必須</span></label>
          <textarea name="message" placeholder="お問い合わせ内容をご記入ください" required></textarea>
        </div>
        <button type="submit" class="submit-btn">送信する</button>
      </form>

      <div class="social-section">
        <h3>SNSでもお気軽にご連絡ください</h3>
        <div class="social-links" id="contact-social-links"></div>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <p class="footer-name" id="footer-club-name">クラブ名</p>
      <div class="footer-info">
        <p id="footer-address"></p>
        <p id="footer-phone"></p>
        <p id="footer-email"></p>
      </div>
      <div class="footer-social">
        <a id="sns-instagram" href="#" style="display:none">Instagram</a>
        <a id="sns-facebook" href="#" style="display:none">Facebook</a>
        <a id="sns-youtube" href="#" style="display:none">YouTube</a>
        <a id="sns-line" href="#" style="display:none">LINE</a>
      </div>
      <p class="footer-copy">&copy; <span id="footer-club-name-copy">クラブ名</span>. All rights reserved.</p>
    </div>
  </footer>

  <script>
    fetch('config/club-config.json')
      .then(r => r.json())
      .then(c => {
        document.title = c.club.name + ' | お問い合わせ';
        document.documentElement.style.setProperty('--main', c.design.mainColor);
        document.documentElement.style.setProperty('--sub', c.design.subColor);
        document.documentElement.style.setProperty('--accent', c.design.accentColor);

        if (c.design.favicon) {
          const fav = document.createElement('link');
          fav.rel = 'icon'; fav.href = c.design.favicon;
          document.head.appendChild(fav);
        }

        const logo = document.getElementById('club-logo');
        if (c.design.logo) { logo.src = c.design.logo; logo.style.display = 'block'; }

        document.getElementById('club-name').textContent = c.club.name;

        // 問い合わせ情報
        document.getElementById('contact-address').textContent = c.contact.address;
        document.getElementById('contact-phone').textContent = c.contact.phone;
        const emailEl = document.getElementById('contact-email');
        emailEl.textContent = c.contact.email;
        emailEl.href = 'mailto:' + c.contact.email;

        // フッター
        document.getElementById('footer-club-name').textContent = c.club.name;
        document.getElementById('footer-club-name-copy').textContent = c.club.name;
        document.getElementById('footer-address').textContent = c.contact.address;
        document.getElementById('footer-phone').textContent = c.contact.phone;
        document.getElementById('footer-email').textContent = c.contact.email;

        // SNS
        const snsMap = {
          'sns-instagram': c.sns.instagram,
          'sns-facebook':  c.sns.facebook,
          'sns-youtube':   c.sns.youtube,
          'sns-line':      c.sns.lineUrl
        };
        Object.entries(snsMap).forEach(([id, url]) => {
          if (url) { const el = document.getElementById(id); el.href = url; el.style.display = ''; }
        });

        // コンタクトページのSNSリンク
        const snsLabels = {
          instagram: 'Instagram',
          facebook:  'Facebook',
          youtube:   'YouTube',
          lineUrl:   'LINE'
        };
        const contactSocial = document.getElementById('contact-social-links');
        const links = Object.entries(snsLabels)
          .filter(([key]) => c.sns[key])
          .map(([key, label]) => `<a class="social-link" href="${c.sns[key]}">${label}</a>`)
          .join('');
        contactSocial.innerHTML = links || '<p style="color:#aaa;font-size:0.85rem">SNSは設定されていません</p>';
      })
      .catch(err => console.error('club-config.json 読み込みエラー:', err));

    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('送信機能は実装が必要です。メールフォームサービスと連携してください。');
    });
  </script>

</body>
</html>
