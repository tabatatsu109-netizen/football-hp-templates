<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選手・スタッフ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --main-color: #e3001b; --dark: #0a0a0c; --dark2: #0e0e11; --dark3: #141418; --light: #f5f4f1; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif; background: var(--dark2); color: #16161a; -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }
    .site-header { position: sticky; top: 0; z-index: 50; background: rgba(12,12,14,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .header-inner { max-width: 1240px; margin: 0 auto; padding: 0 24px; height: 74px; display: flex; align-items: center; gap: 20px; }
    .header-logo { display: flex; align-items: center; gap: 11px; flex: none; }
    .logo-mark { width: 38px; height: 38px; background: var(--main-color); display: flex; align-items: center; justify-content: center; transform: rotate(45deg); flex: none; }
    .logo-mark-img { width: 38px; height: 38px; object-fit: contain; display: none; }
    .logo-mark.logo-has-img { transform: none; background: transparent; width: 44px; height: 44px; }
    .logo-mark.logo-has-img .logo-mark-img { width: 44px; height: 44px; }
    .logo-mark-letter { transform: rotate(-45deg); font-family: 'Anton',sans-serif; color: #fff; font-size: 18px; line-height: 1; }
    .logo-text { display: flex; flex-direction: column; line-height: 1; }
    .logo-name { font-family: 'Anton',sans-serif; color: #fff; font-size: 18px; letter-spacing: 1px; }
    .logo-sub  { color: #8d8d96; font-size: 10px; letter-spacing: 3px; margin-top: 3px; }
    .header-nav { flex: 1; display: flex; justify-content: center; gap: 22px; }
    .header-nav a { color: #dcdce0; font-size: 13px; font-weight: 500; letter-spacing: 1px; transition: color 0.2s; }
    .header-nav a:hover { color: #fff; }
    .header-nav a.active { color: #fff; border-bottom: 2px solid var(--main-color); padding-bottom: 2px; }
    .header-actions { display: flex; align-items: center; gap: 12px; flex: none; }
    .btn-login { color: #9a9aa2; font-size: 12px; letter-spacing: 1px; border: 1px solid rgba(255,255,255,0.18); padding: 9px 14px; border-radius: 2px; }
    .btn-trial { background: var(--main-color); color: #fff; font-size: 13px; font-weight: 700; letter-spacing: 1px; padding: 11px 20px; border-radius: 2px; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }
    .hamburger span { display: block; width: 22px; height: 2px; background: #fff; border-radius: 1px; }
    .mobile-nav { display: none; position: fixed; inset: 0; z-index: 49; background: rgba(10,10,12,0.97); flex-direction: column; align-items: center; justify-content: center; gap: 28px; }
    .mobile-nav.open { display: flex; }
    .mobile-nav a { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: 2px; }
    .mobile-nav-close { position: absolute; top: 20px; right: 24px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }

    .page-hero { background: var(--dark2); padding: 60px 24px 50px; border-bottom: 3px solid var(--main-color); }
    .page-hero-inner { max-width: 1240px; margin: 0 auto; }
    .page-en { font-family: 'Anton',sans-serif; color: var(--main-color); font-size: 13px; letter-spacing: 4px; }
    .page-title { margin: 8px 0 0 0; color: #fff; font-size: 42px; font-weight: 900; letter-spacing: 1px; font-family: 'Anton',sans-serif; }
    .breadcrumb { margin-top: 16px; display: flex; gap: 8px; align-items: center; font-size: 12px; color: #76767f; }
    .breadcrumb a { color: #76767f; }

    .main-content { max-width: 1240px; margin: 0 auto; padding: 60px 24px; }
    .section-en { font-family:'Anton',sans-serif; color:var(--main-color); font-size:14px; letter-spacing:4px; }
    .section-title { margin:8px 0 28px 0; color:#fff; font-size:28px; font-weight:900; letter-spacing:1px; }

    .players-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:18px; margin-bottom:60px; }
    .player-card { background:var(--dark3); border:1px solid #222228; overflow:hidden; display:flex; flex-direction:column; }
    .player-photo { position:relative; height:200px; background-image:repeating-linear-gradient(45deg,#1f1f25 0 10px,#17171c 10px 20px); }
    .player-number { position:absolute;top:0;left:0;background:var(--main-color);color:#fff;font-family:'Anton',sans-serif;font-size:26px;line-height:1;padding:8px 12px; }
    .player-pos-badge { position:absolute;right:10px;bottom:10px;font-size:11px;font-weight:700;letter-spacing:1px;color:#fff;padding:4px 9px; }
    .player-photo-label { position:absolute;left:0;bottom:8px;font-family:ui-monospace,monospace;font-size:9px;color:#5a5a62;padding:0 12px; }
    .player-info { padding:16px 14px 18px; overflow:hidden; }
    .player-name { color:#fff; font-size:16px; font-weight:900; letter-spacing:1px; line-height:1.3; margin-bottom:4px; }
    .player-meta { margin-top:4px; display:block; min-height:32px; }
    .player-grade { color:#9a9aa2; font-size:11px; line-height:1.4; display:block; word-wrap:break-word; white-space:normal; }
    .player-sep   { color:#3a3a42; }
    .player-note  { color:#9a9aa2; font-size:12px; }

    .staff-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
    .staff-card { background:var(--dark3); border:1px solid #222228; padding:28px; }
    .staff-role { color:var(--main-color); font-size:12px; font-weight:700; letter-spacing:2px; }
    .staff-name { color:#fff; font-size:20px; font-weight:900; letter-spacing:1px; margin:8px 0; }
    .staff-license { display:inline-block; background:#222228; color:#9a9aa2; font-size:11px; padding:4px 10px; margin-bottom:12px; }
    .staff-comment { color:#9a9aa2; font-size:14px; line-height:1.75; }

    .site-footer { background:var(--dark);padding:54px 24px 30px;border-top:3px solid var(--main-color); }
    .footer-inner { max-width:1240px;margin:0 auto;display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap; }
    .footer-logo-wrap { display:flex;align-items:center;gap:11px; }
    .footer-logo-mark { width:34px;height:34px;background:var(--main-color);display:flex;align-items:center;justify-content:center;transform:rotate(45deg);flex:none; }
    .footer-logo-letter { transform:rotate(-45deg);font-family:'Anton',sans-serif;color:#fff;font-size:16px; }
    .footer-club-name { font-family:'Anton',sans-serif;color:#fff;font-size:18px;letter-spacing:1px; }
    .footer-tagline { margin:18px 0 0 0;color:#76767f;font-size:13px;line-height:1.9; }
    .footer-links { display:flex;gap:56px;flex-wrap:wrap; }
    .footer-col { display:flex;flex-direction:column;gap:11px; }
    .footer-col-title { color:var(--main-color);font-family:'Anton',sans-serif;font-size:12px;letter-spacing:2px; }
    .footer-col a { color:#b6b6bc;font-size:13px; }
    .footer-bottom { max-width:1240px;margin:38px auto 0;padding-top:20px;border-top:1px solid #1d1d22;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px; }
    .footer-copy { color:#55555c;font-size:11px;letter-spacing:1px; }

    @media (max-width:900px) {
      .header-nav,.btn-login { display:none; }
      .hamburger { display:flex; }
      .players-grid { grid-template-columns:repeat(2,1fr); }
      .staff-grid   { grid-template-columns:1fr; }
      .footer-inner { flex-direction:column;gap:32px; }
    }
    @media (max-width:600px) {
      .players-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="header-logo">
        <div class="logo-mark">
          <img id="club-logo" class="logo-mark-img" src="" alt="ロゴ">
          <span class="logo-mark-letter" id="logo-abbr">G</span>
        </div>
        <div class="logo-text">
          <img id="club-short-name" src="assets/logo2.png" alt="八ヶ岳グランデFC" class="logo-name-img" style="height:30px;object-fit:contain;">
        </div>
      </a>
      <nav class="header-nav">
        <a href="club.html">CLUB</a>
        <a href="results.html">試合・結果</a>
        <a href="news.html">お知らせ</a>
        <a href="team.html" class="active">選手</a>
        <a href="partners.html">パートナー</a>
        <a href="index.html#school">スクール・体験</a>
      </nav>
      <div class="header-actions">
        <a href="index.html#members" class="btn-login">ログイン</a>
        <a href="index.html#school" class="btn-trial">体験申込</a>
      </div>
      <button class="hamburger" id="hamburger-btn"><span></span><span></span><span></span></button>
    </div>
  </header>

  <nav class="mobile-nav" id="mobile-nav">
    <button class="mobile-nav-close" id="mobile-nav-close">✕</button>
    <a href="club.html">CLUB</a>
    <a href="results.html">試合・結果</a>
    <a href="news.html">お知らせ</a>
    <a href="team.html">選手</a>
    <a href="partners.html">パートナー</a>
    <a href="index.html#school">スクール・体験</a>
  </nav>

  <div class="page-hero">
    <div class="page-hero-inner">
      <div class="page-en">PLAYERS</div>
      <h1 class="page-title">選手・スタッフ</h1>
      <div class="breadcrumb"><a href="index.html">HOME</a><span style="color:#3a3a42;">›</span><span>選手・スタッフ</span></div>
    </div>
  </div>

  <main class="main-content">
    <div>
      <div class="section-en">PLAYERS</div>
      <h2 class="section-title">選手のプロフィール</h2>
      <div class="players-grid" id="players-grid"></div>
    </div>
    <div id="staff-section" style="display:none;">
      <div class="section-en">STAFF</div>
      <h2 class="section-title">スタッフ</h2>
      <div class="staff-grid" id="staff-grid"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div>
        <div class="footer-logo-wrap">
          <div class="footer-logo-mark"><span class="footer-logo-letter" id="footer-abbr">G</span></div>
          <span class="footer-club-name" id="footer-club-name">クラブ名</span>
        </div>
        <p class="footer-tagline" id="footer-tagline">八ヶ岳を拠点とするジュニアユースクラブ。</p>
      </div>
      <div class="footer-links">
        <div class="footer-col">
          <span class="footer-col-title">MENU</span>
          <a href="club.html">クラブについて</a>

          <span class="footer-col-title">JOIN</span>

    </div>
    <div class="footer-bottom">
      <span class="footer-copy">© <span id="footer-year"></span> <span id="footer-club-name-copy">クラブ名</span>. ALL RIGHTS RESERVED.</span>
    </div>
  </footer>

  <script src="js/config-loader.js"></script>
  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();
    document.getElementById('hamburger-btn').addEventListener('click',function(){ document.getElementById('mobile-nav').classList.add('open'); });
    document.getElementById('mobile-nav-close').addEventListener('click',function(){ document.getElementById('mobile-nav').classList.remove('open'); });

    var posColor = { GK:'#b8870b', DF:'#2a6fd6', MF:'#1f8a4c', FW:'var(--main-color)' };
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    ConfigLoader.apply({
      pageTitle: '選手・スタッフ',
      onLoaded: function(c){
        function get(obj,path){ return path.split('.').reduce(function(o,k){ return(o!=null&&o[k]!==undefined)?o[k]:null; },obj); }
        var abbr=get(c,'club.abbreviation')||(get(c,'club.shortName')||'?')[0];
        ['logo-abbr','footer-abbr'].forEach(function(id){ var el=document.getElementById(id); if(el)el.textContent=abbr; });
        var logoSrc=get(c,'design.logo');
        if(logoSrc){ var li=document.getElementById('club-logo'); if(li){li.src=logoSrc;li.style.display='block';var ll=document.getElementById('logo-abbr');if(ll)ll.style.display='none';} }

        // JSONBinからプレイヤーデータを読み込む
        var binId = get(c,'playerIntegration.jsonbinBinId');
        var apiKey = '$2a$10$xopawUKPa.2MV76.BGLZtehG8EauPnBwXLLyCgXqw/H5NfvD.yuOq';

        if(binId){
          fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest',{
            headers:{'X-Master-Key':apiKey}
          }).then(function(res){ return res.json(); })
            .then(function(data){
              var allPlayers = (data.record && data.record.players) || [];

              // カテゴリー別に分類
              var players = allPlayers.filter(function(p){ return p.category !== 'staff'; });
              var staff = allPlayers.filter(function(p){ return p.category === 'staff'; });

              // 選手表示
              var pgrid = document.getElementById('players-grid');
              if(pgrid){
                pgrid.innerHTML = players.map(function(p){
                  var pc = posColor[p.position] || '#76767f';
                  return '<div class="player-card">'+
                    '<div class="player-photo" '+(p.photo?'style="background-image:url('+esc(p.photo)+');background-size:cover;background-position:center top;"':'')+'>'+
                      '<span class="player-number">'+esc(p.number||'—')+'</span>'+
                      (p.photo?'':'<span class="player-photo-label">選手写真</span>')+
                      '<span class="player-pos-badge" style="background:'+pc+';">'+esc(p.position||'')+'</span>'+
                    '</div>'+
                    '<div class="player-info">'+
                      '<div class="player-name">'+esc(p.name||'')+'</div>'+
                      '<div class="player-meta">'+
                        '<span class="player-grade">'+esc(p.nameEn||'')+'</span>'+
                      '</div>'+
                    '</div>'+
                    '</div>';
                }).join('');
                if(players.length===0) pgrid.innerHTML='<p style="color:#76767f;font-size:14px;padding:20px 0;">選手情報を読み込み中...</p>';
              }

              // スタッフ表示
              if(staff.length > 0){
                document.getElementById('staff-section').style.display = 'block';
                var sgrid = document.getElementById('staff-grid');
                if(sgrid){
                  sgrid.innerHTML = staff.map(function(s){
                    return '<div class="staff-card">'+
                      '<div class="staff-role">'+esc(s.position||'')+'</div>'+
                      '<div class="staff-name">'+esc(s.name||'')+'</div>'+
                      '<p class="staff-comment">'+esc(s.nameEn||'')+'</p>'+
                      '</div>';
                  }).join('');
                }
              }
            })
            .catch(function(e){
              console.error('Failed to load players',e);
              var pgrid = document.getElementById('players-grid');
              if(pgrid) pgrid.innerHTML='<p style="color:#76767f;font-size:14px;padding:20px 0;">選手情報の読み込みに失敗しました</p>';
            });
        }
      }
    });
  </script>
</body>
</html>
